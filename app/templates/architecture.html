<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Architecture — Notify Health WhatsApp Prototype</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; font-family: 'IBM Plex Mono', monospace; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const BG    = "#0d1117";
    const CARD  = "#161b22";
    const BORD  = "#30363d";
    const BORD_DIM = "#21262d";
    const GREEN = "#3fb950";
    const BLUE  = "#79c0ff";
    const ORG   = "#f0883e";
    const PUR   = "#d2a8ff";
    const MUTED = "#8b949e";
    const TEXT  = "#c9d1d9";
    const RED   = "#ff7b72";

    const NODES = {
      trigger: { x: 20,  y: 200, w: 145, h: 58, label: "Campaign Trigger", sub: "POST /send",          col: MUTED  },
      app:     { x: 238, y: 200, w: 188, h: 58, label: "FastAPI App",       sub: "Python 3.12 · httpx", col: GREEN  },
      db:      { x: 540, y: 200, w: 155, h: 58, label: "SQLite DB",         sub: "SQLAlchemy 2.0",      col: BLUE   },
      meta:    { x: 238, y: 35,  w: 188, h: 58, label: "Meta Cloud API",    sub: "graph.facebook.com",  col: ORG    },
      phone:   { x: 540, y: 35,  w: 155, h: 58, label: "Recipient's Phone", sub: "WhatsApp client",     col: PUR    },
      browser: { x: 20,  y: 358, w: 155, h: 58, label: "Dashboard",         sub: "Browser · HTMX",      col: PUR    },
    };

    const ARROW_DEFS = [
      { id: "m-org",   col: ORG   },
      { id: "m-grn",   col: GREEN },
      { id: "m-blu",   col: BLUE  },
      { id: "m-pur",   col: PUR   },
      { id: "m-muted", col: MUTED },
    ];

    const ARROWS = [
      {
        id: "trigger-app",
        d: "M 165,229 L 238,229",
        col: MUTED, marker: "m-muted",
        label: "POST /send", lx: 165, ly: 222,
        related: ["trigger", "app"],
        title: "Campaign Trigger → App",
        summary: "Admin (or a cron job) calls POST /send to start a campaign run.",
        points: [
          "App reads all recipient rows from DB",
          "Iterates and calls Meta API once per recipient",
          "Creates a messages row per recipient with status: queued",
        ],
        failures: [
          {
            what: "422 Unprocessable Entity on POST /send",
            error: '"detail": [{"type":"missing","loc":["body","field_name"]}]',
            where: "HTTP response body. Open /docs, find POST /send, click 'Try it out' to debug interactively.",
            fix: "Check request body matches schema. The /docs page lists every required field with types.",
          },
          {
            what: "500 — tables don't exist on first run",
            error: "sqlalchemy.exc.OperationalError: no such table: recipients",
            where: "Railway logs → uvicorn traceback, visible immediately on startup.",
            fix: "DB not initialised. Confirm create_all() runs inside the lifespan event in main.py before the app starts accepting requests.",
          },
        ],
      },
      {
        id: "app-meta",
        d: "M 322,200 L 322,93",
        col: ORG, marker: "m-org",
        label: "① POST /messages", sublabel: "Authorization: Bearer {token}",
        lx: 164, ly: 145,
        related: ["app", "meta"],
        title: "① App → Meta: Send a template message",
        summary: "App calls Meta's REST API to send a pre-approved template message to a recipient. This is a standard HTTPS request.",
        points: [
          "URL: POST /v25.0/{phone_number_id}/messages on graph.facebook.com",
          "Header: Authorization: Bearer {access_token}",
          "Body: template name + language code + recipient number + parameter slots",
          "⚠ Token expires every 24h in test tier — use a System User token in production",
          "Token lives in .env — NEVER commit it to Git",
        ],
        failures: [
          {
            what: "401 Unauthorized — token expired",
            error: '{"error":{"code":190,"type":"OAuthException","message":"Invalid OAuth access token"}}',
            where: "Logged by app from Meta HTTP response. Check Railway logs for the raw Meta error.",
            fix: "Test tokens last 24h. Generate a new one: Meta Developer Dashboard → WhatsApp → API Setup → Access token field.",
          },
          {
            what: "Template not found or wrong language code",
            error: '{"error":{"code":132001,"message":"Template name does not exist in the translation"}}',
            where: "Meta API response body, logged by the app. Check Railway logs.",
            fix: "Name or language in config.py doesn't match an approved template. Check: Meta Business Manager → Account Tools → Message Templates.",
          },
          {
            what: "Wrong PHONE_NUMBER_ID in config",
            error: '{"error":{"code":100,"message":"Invalid parameter"}}',
            where: "Meta API response body. Check Railway logs.",
            fix: "Verify META_PHONE_NUMBER_ID in .env matches the number ID in Meta Developer Dashboard → WhatsApp → API Setup.",
          },
        ],
      },
      {
        id: "meta-app-ack",
        d: "M 344,93 L 344,200",
        col: ORG, marker: "m-org",
        label: "② 200 OK + wamid.X", lx: 350, ly: 145,
        related: ["meta", "app"],
        title: "② Meta → App: Receipt (not delivery!)",
        summary: "Meta responds immediately with a message ID. This is just a receipt — actual delivery happens asynchronously in the background.",
        points: [
          "Response body: messages[0].id = wamid.HBgN… (the wamid)",
          "Store wamid in messages.meta_message_id — it MUST be indexed",
          "This wamid is the shared key that links ①②⑤ together",
          "A 200 OK here does NOT mean the message was delivered to the phone",
        ],
        failures: [
          {
            what: "Response has error object, no wamid",
            error: '{"error":{...}} — no "messages" key in response body',
            where: "App logs raw Meta response. messages.meta_message_id stays NULL in DB.",
            fix: "Read error.code from the log to diagnose (190 = token, 132001 = template, 100 = phone ID). Fix that root cause first.",
          },
          {
            what: "wamid saved but status stuck at 'sent' forever",
            error: "No error visible — webhooks just never arrive.",
            where: "messages table: current_status='sent'. message_events table: empty.",
            fix: "Webhook pipeline is broken. Select the ⑤ webhook arrow and check that failure's diagnosis steps.",
          },
        ],
      },
      {
        id: "meta-phone",
        d: "M 426,56 L 540,56",
        col: PUR, marker: "m-pur",
        label: "③ routes message (async)", lx: 428, ly: 48,
        related: ["meta", "phone"],
        title: "③ Meta → Phone: Async message delivery",
        summary: "Meta delivers the message to the recipient's phone in the background. Completely asynchronous from your HTTP request.",
        points: [
          "Happens seconds to minutes after step ①",
          "Phone must be online with WhatsApp installed",
          "Template must be pre-approved by Meta before it can be sent",
          "Only approved templates can initiate contact outside a 24h window",
        ],
        failures: [
          {
            what: "Test mode: number not verified, send fails immediately",
            error: "HTTP 4xx from Meta with no wamid assigned (test-mode-only behaviour — see DR-014).",
            where: "App logs. messages row has no meta_message_id.",
            fix: "In test mode, each recipient must verify via a code. Meta Developer Dashboard → WhatsApp → API Setup → 'To' section → Add number.",
          },
          {
            what: "Production: number not on WhatsApp, fails after send",
            error: "Webhook arrives with status='failed', error_code=131026.",
            where: "message_events table, error_code column. Dashboard shows 'failed' status.",
            fix: "Expected — reachability classifier automatically sets whatsapp_reachable='no'. Future campaigns will skip this number.",
          },
        ],
      },
      {
        id: "phone-meta",
        d: "M 540,73 L 426,73",
        col: PUR, marker: "m-pur",
        label: "④ delivery/read ACK", lx: 428, ly: 87,
        related: ["phone", "meta"],
        title: "④ Phone → Meta: Status acknowledgement",
        summary: "The WhatsApp client reports back to Meta when the message is delivered or read. Meta then forwards this to your app via webhook.",
        points: [
          "delivered fires when message reaches the device inbox",
          "read fires only if the recipient has read receipts enabled in WhatsApp settings",
          "Many users disable read receipts — absence of read does NOT mean unread",
          "failed means the message could not be delivered (number not on WhatsApp, etc.)",
        ],
        failures: [
          {
            what: "'read' status never arrives",
            error: "No error — this is normal and expected.",
            where: "message_events: 'delivered' row exists, no 'read' row.",
            fix: "Not a bug. Most users disable read receipts. Treat 'delivered' as the reliable signal for all reporting to Notify Health.",
          },
          {
            what: "'delivered' stuck for hours — phone offline",
            error: "messages.current_status = 'sent', no message_events rows.",
            where: "Dashboard status column. messages table.",
            fix: "Meta retries when phone comes online. If stuck >24h, first verify webhook pipeline is healthy on a known-good number, then treat the number as unreachable.",
          },
        ],
      },
      {
        id: "webhook",
        d: "M 238,64 C 152,64 152,229 238,229",
        col: GREEN, marker: "m-grn",
        label: "⑤ POST /webhook", sublabel: "wamid + status · HMAC-256",
        lx: 38, ly: 155,
        related: ["meta", "app"],
        dashed: true,
        title: "⑤ Meta → App: Webhook callback (the critical one)",
        summary: "Meta calls YOUR server to report every status change. This is the most important — and most breakage-prone — connection in the whole system.",
        points: [
          "⚠ Requires a public HTTPS URL — localhost will NOT work",
          "Use ngrok in development, your Railway URL in production",
          "One-time registration handshake: Meta sends a challenge, your app echoes it back",
          "Every POST is signed with X-Hub-Signature-256 — MUST verify using your app secret",
          "MUST respond 200 OK — Meta retries with exponential backoff on any other response",
          "Extract wamid → look up messages row → insert message_events row → update current_status",
        ],
        failures: [
          {
            what: "No webhook events ever arrive",
            error: "message_events empty. Status stuck at 'sent' for all messages.",
            where: "Meta Developer Dashboard → WhatsApp → Configuration → Webhook → click 'Test' to see delivery errors.",
            fix: "1) ngrok restarted? Re-register new URL in Meta dashboard. 2) App down? Check Railway. 3) Wrong URL registered? Verify in Meta → WhatsApp → Configuration.",
          },
          {
            what: "Signature mismatch — webhooks silently rejected",
            error: "HTTP 403 from app. 'invalid signature' in Railway logs.",
            where: "Railway logs — look for 403 responses on POST /webhook.",
            fix: "META_APP_SECRET in .env doesn't match App Secret in Meta Developer Dashboard → App Settings → Basic. Easy to confuse with the access token — they're different values.",
          },
          {
            what: "Meta keeps retrying — duplicate events in DB",
            error: "Duplicate rows in message_events. Same wamid logged multiple times in Railway logs.",
            where: "Railway logs — repeated POST /webhook from Meta IPs with the same wamid.",
            fix: "App returned non-200 due to an unhandled exception in the webhook handler. Find the traceback in Railway logs and fix the error. Also add an idempotency check: skip insert if a row with that wamid + status already exists.",
          },
        ],
      },
      {
        id: "app-db",
        d: "M 426,229 L 540,229",
        col: BLUE, marker: "m-blu",
        label: "⑥ SQLAlchemy read/write", lx: 428, ly: 222,
        related: ["app", "db"],
        title: "⑥ App ↔ DB: Persistence throughout all flows",
        summary: "The app reads from and writes to SQLite via SQLAlchemy ORM throughout every flow. The database is the source of truth.",
        points: [
          "Read: fetch recipients for campaign (+ skip known-unreachable)",
          "Write: create messages row → status transitions: queued → sent → delivered/failed",
          "Write: insert message_events row on every webhook (full history log)",
          "Write: update recipients.whatsapp_reachable = yes/no/unknown based on delivery outcome",
          "Swap SQLite for Postgres in production — one connection string change, nothing else",
        ],
        failures: [
          {
            what: "database is locked — concurrent writes",
            error: "sqlalchemy.exc.OperationalError: database is locked",
            where: "Railway logs — uvicorn traceback during overlapping requests (e.g. campaign send + incoming webhook).",
            fix: "SQLite allows only one writer at a time. For the prototype, avoid triggering a campaign while webhooks are still arriving. Production fix: Postgres (DR-005 — one connection string change).",
          },
          {
            what: "Data disappears on every Railway redeploy",
            error: "No Python error — dashboard just shows empty data after each deploy.",
            where: "Railway → your service → Volumes. Check if volume is mounted.",
            fix: "SQLite file is on the ephemeral filesystem, not the persistent volume. Fix: volume must be mounted at /app/data, and DATABASE_URL must be sqlite:////app/data/app.db (four slashes = absolute path). See DR-017.",
          },
          {
            what: "no such table after deploy (volume misconfigured)",
            error: "sqlalchemy.exc.OperationalError: no such table: recipients",
            where: "Railway logs immediately after deploy.",
            fix: "Same root cause as above — app created DB on the ephemeral filesystem. Fix the volume mount first; tables will then persist across deploys.",
          },
        ],
      },
      {
        id: "dashboard",
        d: "M 155,358 L 265,258",
        col: MUTED, marker: "m-muted",
        markerBoth: true,
        label: "GET /dashboard", sublabel: "← Jinja2 HTML · HTMX refresh",
        lx: 148, ly: 304,
        related: ["browser", "app"],
        title: "Dashboard ↔ App (bidirectional)",
        summary: "Browser requests the dashboard; server renders HTML with current DB state. HTMX auto-refreshes the status column every few seconds.",
        points: [
          "GET /dashboard → FastAPI reads DB → Jinja2 renders HTML response",
          "HTMX polls every few seconds and swaps only the status column (no full reload)",
          "No JavaScript framework needed — server does all the work",
          "Shows per-recipient: whatsapp_reachable status + latest message status",
        ],
        failures: [
          {
            what: "Status columns never update — HTMX polling stopped",
            error: "No visible error — data just looks permanently stale.",
            where: "Browser DevTools → Console tab (JS errors); Network tab (watch for HTMX polling requests).",
            fix: "A JS error or failed request stops HTMX silently. Hard-refresh (Cmd+Shift+R / Ctrl+F5) to restart. Check DevTools Console for the root cause.",
          },
          {
            what: "500 on GET /dashboard — blank or error page",
            error: "HTTP 500. Browser shows error page or blank screen.",
            where: "Railway logs → uvicorn traceback.",
            fix: "Usually a DB query error or Jinja2 template rendering error. Check Railway logs for the Python traceback — often a schema mismatch after a schema change.",
          },
          {
            what: "whatsapp_reachable stuck at 'unknown' despite deliveries",
            error: "No error — column just never updates after successful delivery.",
            where: "Dashboard recipients column. recipients table in DB.",
            fix: "Webhook handler not updating recipients.whatsapp_reachable. Confirm message_events has 'delivered' rows — if yes, trace the update logic in webhook.py.",
          },
        ],
      },
    ];

    function LabelBox({ x, y, text, sub, col }) {
      const w = Math.max(text.length * 7, sub ? sub.length * 6.5 : 0) + 10;
      return (
        <g>
          <rect x={x - 4} y={y - 12} width={w} height={sub ? 26 : 15} rx="3"
            fill={BG} stroke={col + "44"} strokeWidth="0.5" />
          <text x={x} y={y} fill={col} fontSize="9.5" fontFamily="'IBM Plex Mono',monospace" fontWeight="600">
            {text}
          </text>
          {sub && (
            <text x={x} y={y + 11} fill={MUTED} fontSize="8.5" fontFamily="'IBM Plex Mono',monospace">
              {sub}
            </text>
          )}
        </g>
      );
    }

    function FailureCard({ f }) {
      return (
        <div style={{
          background: BG,
          border: `1px solid ${ORG}33`,
          borderLeft: `3px solid ${ORG}`,
          borderRadius: 4,
          padding: "10px 12px",
        }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: ORG, marginBottom: 8 }}>
            ⚠ {f.what}
          </div>
          {[
            { label: "Error",  value: f.error, col: RED   },
            { label: "Where",  value: f.where, col: BLUE  },
            { label: "Fix",    value: f.fix,   col: GREEN },
          ].map(row => (
            <div key={row.label} style={{ display: "flex", gap: 8, fontSize: 10, marginBottom: 4, alignItems: "flex-start" }}>
              <span style={{
                color: MUTED, minWidth: 36, fontWeight: 700,
                letterSpacing: "0.5px", paddingTop: 1, flexShrink: 0,
              }}>
                {row.label}
              </span>
              <span style={{ color: row.col, lineHeight: 1.6, wordBreak: "break-word" }}>
                {row.value}
              </span>
            </div>
          ))}
        </div>
      );
    }

    function ArchFlowchart() {
      const [active, setActive] = useState(null);
      const [tab, setTab]       = useState("how");

      const handleArrowClick = (id) => {
        if (active !== id) setTab("how");
        setActive(prev => prev === id ? null : id);
      };

      const info = ARROWS.find(a => a.id === active);

      const isRelated = (nodeId) => {
        if (!active) return false;
        return ARROWS.find(a => a.id === active)?.related?.includes(nodeId);
      };

      return (
        <div style={{
          background: BG, minHeight: "100vh",
          fontFamily: "'IBM Plex Mono',monospace",
          color: TEXT, padding: "20px 16px", boxSizing: "border-box",
        }}>

          {/* ── Header ── */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, gap: 12 }}>
            <div>
              <div style={{ fontSize: 10, color: GREEN, letterSpacing: "2px", textTransform: "uppercase", marginBottom: 4 }}>
                ● notify-health-whatsapp-prototype
              </div>
              <h1 style={{ margin: 0, fontSize: 18, color: "#f0f6fc", fontWeight: 700, letterSpacing: "-0.5px" }}>
                System Architecture
              </h1>
              <p style={{ margin: "5px 0 0", fontSize: 11, color: MUTED }}>
                Tap any arrow — "How it works" or "What can break"
              </p>
            </div>
            <a href="/dashboard" style={{
              display: "inline-block",
              background: GREEN + "18",
              border: `1px solid ${GREEN}55`,
              color: GREEN,
              borderRadius: 6,
              padding: "8px 14px",
              fontSize: 11,
              fontFamily: "'IBM Plex Mono',monospace",
              textDecoration: "none",
              letterSpacing: "0.5px",
              whiteSpace: "nowrap",
              flexShrink: 0,
            }}>
              ← Dashboard
            </a>
          </div>

          {/* ── SVG diagram ── */}
          <div style={{ overflowX: "auto", borderRadius: 8, border: `1px solid ${BORD}`, background: CARD }}>
            <svg viewBox="0 0 730 445" style={{ width: "100%", minWidth: 500, display: "block" }}>
              <defs>
                {ARROW_DEFS.map(({ id, col }) => (
                  <marker key={id} id={id} markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
                    <path d="M0,0 L0,6 L7,3 z" fill={col} />
                  </marker>
                ))}
                <marker id="m-muted-start" markerWidth="7" markerHeight="7" refX="1.5" refY="3" orient="auto">
                  <path d="M7,0 L7,6 L0,3 z" fill={MUTED} />
                </marker>
              </defs>

              {/* Meta boundary */}
              <rect x="228" y="22" width="482" height="82" rx="8"
                fill="none" stroke={ORG + "35"} strokeWidth="1.2" strokeDasharray="6,4" />
              <text x="628" y="18" fill={ORG + "70"} fontSize="9" fontFamily="monospace" textAnchor="middle">
                Meta Infrastructure (external)
              </text>

              {/* ── Arrows ── */}
              {ARROWS.map(arrow => {
                const isActive = active === arrow.id;
                const isDim    = !!active && !isActive;
                return (
                  <g key={arrow.id}
                    onClick={() => handleArrowClick(arrow.id)}
                    style={{ cursor: "pointer" }}
                    opacity={isDim ? 0.18 : 1}
                  >
                    <path d={arrow.d} stroke="transparent" strokeWidth="18" fill="none" />
                    <path
                      d={arrow.d}
                      stroke={isActive ? arrow.col : arrow.col + "99"}
                      strokeWidth={isActive ? 2.5 : 1.8}
                      fill="none"
                      strokeDasharray={arrow.dashed ? "7,4" : undefined}
                      markerEnd={`url(#${arrow.marker})`}
                      markerStart={arrow.markerBoth ? "url(#m-muted-start)" : undefined}
                    />
                    <LabelBox
                      x={arrow.lx} y={arrow.ly}
                      text={arrow.label} sub={arrow.sublabel}
                      col={isActive ? arrow.col : TEXT}
                    />
                  </g>
                );
              })}

              {/* ── Nodes ── */}
              {Object.entries(NODES).map(([id, n]) => {
                const rel = isRelated(id);
                const dim = !!active && !rel;
                const cx  = n.x + n.w / 2;
                const cy  = n.y + n.h / 2;
                return (
                  <g key={id} opacity={dim ? 0.3 : 1}>
                    {rel && (
                      <rect x={n.x - 3} y={n.y - 3} width={n.w + 6} height={n.h + 6} rx="10"
                        fill={n.col + "18"} stroke={n.col + "44"} strokeWidth="1" />
                    )}
                    <rect x={n.x} y={n.y} width={n.w} height={n.h} rx="7"
                      fill={CARD}
                      stroke={rel ? n.col : BORD}
                      strokeWidth={rel ? 1.8 : 1}
                    />
                    <text x={cx} y={cy - 7} textAnchor="middle"
                      fill={dim ? BORD : n.col}
                      fontSize="12" fontWeight="700" fontFamily="monospace">
                      {n.label}
                    </text>
                    <text x={cx} y={cy + 10} textAnchor="middle"
                      fill={dim ? BORD : MUTED}
                      fontSize="9.5" fontFamily="monospace">
                      {n.sub}
                    </text>
                  </g>
                );
              })}

              {/* Webhook annotation */}
              <g opacity={active && active !== "webhook" ? 0.15 : 1}>
                <rect x="13" y="100" width="133" height="30" rx="4"
                  fill={BG} stroke={active === "webhook" ? GREEN + "66" : BORD_DIM} strokeWidth="1" />
                <text x="20" y="115" fill={active === "webhook" ? GREEN : MUTED} fontSize="8.5" fontFamily="monospace">
                  ⚠ public HTTPS URL required
                </text>
                <text x="20" y="126" fill={active === "webhook" ? MUTED + "aa" : BORD} fontSize="8" fontFamily="monospace">
                  ngrok (dev) · Railway (prod)
                </text>
              </g>

              {/* wamid callout */}
              <g opacity={active && active !== "app-meta" && active !== "meta-app-ack" ? 0.12 : 1}>
                <rect x="249" y="136" width="83" height="18" rx="3"
                  fill={BG} stroke={ORG + "40"} strokeWidth="1" />
                <text x="290" y="149" textAnchor="middle"
                  fill={active === "app-meta" || active === "meta-app-ack" ? ORG : MUTED}
                  fontSize="8.5" fontFamily="monospace">
                  wamid links ①②⑤
                </text>
              </g>

              <text x="365" y="435" textAnchor="middle" fill={BORD} fontSize="9" fontFamily="monospace">
                ① → ② → ③ → ④ → ⑤   (numbered arrows show the send + delivery sequence)
              </text>
            </svg>
          </div>

          {/* ── Info panel ── */}
          <div style={{
            marginTop: 12,
            background: CARD,
            border: `1px solid ${info ? info.col + "55" : BORD}`,
            borderRadius: 8,
            padding: "14px 16px",
            minHeight: 72,
            transition: "border-color 0.25s",
          }}>
            {info ? (
              <>
                {/* Title row */}
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: info.col, lineHeight: 1.3 }}>
                    {info.title}
                  </div>
                  <button onClick={() => setActive(null)}
                    style={{ background: "none", border: "none", color: MUTED, cursor: "pointer", fontSize: 18, padding: "0 0 0 12px", lineHeight: 1 }}>
                    ×
                  </button>
                </div>

                {/* Tabs */}
                <div style={{ display: "flex", gap: 4, marginBottom: 12 }}>
                  {[
                    { id: "how",   label: "HOW IT WORKS"    },
                    { id: "break", label: "⚠ WHAT CAN BREAK" },
                  ].map(t => (
                    <button key={t.id}
                      onClick={() => setTab(t.id)}
                      style={{
                        background:   tab === t.id ? info.col + "22" : "transparent",
                        border:       `1px solid ${tab === t.id ? info.col : BORD}`,
                        color:        tab === t.id ? (t.id === "break" ? ORG : info.col) : MUTED,
                        borderRadius: 4,
                        padding:      "4px 12px",
                        fontSize:     10,
                        fontFamily:   "'IBM Plex Mono',monospace",
                        cursor:       "pointer",
                        letterSpacing:"0.5px",
                        fontWeight:   tab === t.id ? 700 : 400,
                      }}>
                      {t.label}
                    </button>
                  ))}
                </div>

                {/* Tab content */}
                {tab === "how" ? (
                  <>
                    <div style={{ fontSize: 11, color: TEXT, marginBottom: 10, lineHeight: 1.7 }}>
                      {info.summary}
                    </div>
                    <div style={{ borderTop: `1px solid ${BORD}`, paddingTop: 8, display: "flex", flexDirection: "column", gap: 5 }}>
                      {info.points.map((p, i) => (
                        <div key={i} style={{ display: "flex", gap: 8, fontSize: 11 }}>
                          <span style={{ color: p.startsWith("⚠") ? ORG : info.col, flexShrink: 0 }}>›</span>
                          <span style={{ color: p.startsWith("⚠") ? ORG : MUTED, lineHeight: 1.55 }}>{p}</span>
                        </div>
                      ))}
                    </div>
                  </>
                ) : (
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {info.failures.map((f, i) => <FailureCard key={i} f={f} />)}
                  </div>
                )}
              </>
            ) : (
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", height: 44, fontSize: 11, color: MUTED }}>
                Tap any arrow — "How it works" or "What can break"
              </div>
            )}
          </div>

          {/* ── Legend ── */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: "10px 16px", marginTop: 12 }}>
            {[
              { col: ORG,   label: "REST API (Meta)"  },
              { col: GREEN, label: "Webhook callback" },
              { col: BLUE,  label: "Database layer"   },
              { col: PUR,   label: "WhatsApp network" },
              { col: MUTED, label: "Internal / UI"    },
            ].map(({ col, label }) => (
              <div key={label} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10, color: MUTED }}>
                <svg width="18" height="8" style={{ flexShrink: 0 }}>
                  <line x1="0" y1="4" x2="18" y2="4" stroke={col} strokeWidth="2" />
                </svg>
                {label}
              </div>
            ))}
            <div style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 10, color: MUTED }}>
              <svg width="18" height="8">
                <line x1="0" y1="4" x2="18" y2="4" stroke={GREEN} strokeWidth="2" strokeDasharray="4,2" />
              </svg>
              dashed = async / webhook
            </div>
          </div>

          <div style={{ marginTop: 16, fontSize: 9, color: BORD, textAlign: "right" }}>
            notify-health-whatsapp-prototype · deadline May 1 2026
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ArchFlowchart />);
  </script>
</body>
</html>
