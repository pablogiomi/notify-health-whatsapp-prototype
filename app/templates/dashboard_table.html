<tbody
  hx-get="/dashboard/table"
  hx-trigger="every 5s"
  hx-swap="outerHTML"
>
  {% for r in recipients %}
  <tr>
    <td>{{ r.name if r.name else "—" }}</td>
    <td>···{{ r.phone_number[-4:] }}</td>
    <td class="reach-{{ r.whatsapp_reachable }}">{{ r.whatsapp_reachable }}</td>
    <td class="status-{{ r.last_status if r.last_status else 'none' }}">
      {{ r.last_status if r.last_status else "—" }}
    </td>
    <td>
      {% if r.last_updated %}{{ r.last_updated.strftime("%Y-%m-%d %H:%M") }}{% else %}—{% endif %}
    </td>
  </tr>
  {% endfor %}
</tbody>
